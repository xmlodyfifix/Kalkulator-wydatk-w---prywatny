<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Tracker Wydatków</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f9f9f9;
        }

        h1, h2 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        th {
            background-color: #4a90d9;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f0f7ff;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .row-jedzenie td {
            border-left: 4px solid #e74c3c;
        }

        .row-transport td {
            border-left: 4px solid #3498db;
        }

        .row-rozrywka td {
            border-left: 4px solid #9b59b6;
        }

        .row-zdrowie td {
            border-left: 4px solid #2ecc71;
        }

        .row-inne td {
            border-left: 4px solid #95a5a6;
        }

        a {
            color: #4a90d9;
            text-decoration: none;
        }

            a:hover {
                text-decoration: underline;
            }

        .btn {
            padding: 8px 16px;
            background: #4a90d9;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

            .btn:hover {
                background: #357abd;
            }

        .btn-danger {
            background: #e74c3c;
        }

            .btn-danger:hover {
                background: #c0392b;
            }

        nav {
            margin-bottom: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

            nav a {
                margin-right: 15px;
                font-weight: bold;
            }

        form {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'lista' %}">📋 Lista wydatków</a>
        <a href="{% url 'dodaj' %}">➕ Dodaj wydatek</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
