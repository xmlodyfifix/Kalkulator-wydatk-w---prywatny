<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudżetApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #070b1a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

            body::before {
                content: '';
                position: fixed;
                top: -200px;
                left: -200px;
                width: 600px;
                height: 600px;
                background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
                pointer-events: none;
                z-index: 0;
            }

            body::after {
                content: '';
                position: fixed;
                bottom: -200px;
                right: -100px;
                width: 500px;
                height: 500px;
                background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
                pointer-events: none;
                z-index: 0;
            }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        nav {
            position: relative;
            z-index: 10;
            background: rgba(15, 20, 40, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(99,102,241,0.2);
            padding: 0 32px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 60px;
        }

        .nav-brand {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 24px;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

            nav a:hover {
                color: #e2e8f0;
                background: rgba(99,102,241,0.15);
            }

        .nav-user {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .card {
            background: rgba(15, 20, 40, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

            .card:hover {
                border-color: rgba(99,102,241,0.4);
            }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(15, 20, 40, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.2s;
        }

            .stat-card:hover {
                border-color: rgba(99,102,241,0.5);
                transform: translateY(-2px);
            }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

            .stat-value.green {
                color: #4ade80;
            }

            .stat-value.red {
                color: #f87171;
            }

            .stat-value.blue {
                color: #818cf8;
            }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(99,102,241,0.15);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 14px;
            color: #cbd5e1;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(99,102,241,0.06);
        }

        .badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 600;
        }

        .badge-jedzenie {
            background: rgba(248,113,113,0.15);
            color: #f87171;
            border: 1px solid rgba(248,113,113,0.3);
        }

        .badge-transport {
            background: rgba(129,140,248,0.15);
            color: #818cf8;
            border: 1px solid rgba(129,140,248,0.3);
        }

        .badge-rozrywka {
            background: rgba(167,139,250,0.15);
            color: #a78bfa;
            border: 1px solid rgba(167,139,250,0.3);
        }

        .badge-zdrowie {
            background: rgba(74,222,128,0.15);
            color: #4ade80;
            border: 1px solid rgba(74,222,128,0.3);
        }

        .badge-inne {
            background: rgba(100,116,139,0.15);
            color: #94a3b8;
            border: 1px solid rgba(100,116,139,0.3);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 0 20px rgba(99,102,241,0.3);
        }

            .btn-primary:hover {
                box-shadow: 0 0 30px rgba(99,102,241,0.5);
                transform: translateY(-1px);
            }

        .btn-green {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 0 20px rgba(34,197,94,0.3);
        }

            .btn-green:hover {
                box-shadow: 0 0 30px rgba(34,197,94,0.5);
                transform: translateY(-1px);
            }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 0 20px rgba(239,68,68,0.3);
        }

            .btn-danger:hover {
                box-shadow: 0 0 30px rgba(239,68,68,0.5);
                transform: translateY(-1px);
            }

        .btn-ghost {
            background: rgba(99,102,241,0.1);
            color: #818cf8;
            border: 1px solid rgba(99,102,241,0.3);
        }

            .btn-ghost:hover {
                background: rgba(99,102,241,0.2);
            }

        .progress-bar {
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            height: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, #6366f1, #818cf8);
            box-shadow: 0 0 10px rgba(99,102,241,0.5);
        }

        select, input {
            background: rgba(15,20,40,0.8);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 10px;
            color: #e2e8f0;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

            select:focus, input:focus {
                border-color: rgba(99,102,241,0.7);
                box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
            }

        label {
            font-size: 13px;
            color: #94a3b8;
            display: block;
            margin-bottom: 6px;
        }

        p {
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .saldo-plus {
            color: #4ade80;
            font-size: 2em;
            font-weight: 700;
        }

        .saldo-minus {
            color: #f87171;
            font-size: 2em;
            font-weight: 700;
        }

        a {
            color: #818cf8;
            text-decoration: none;
        }

            a:hover {
                color: #a5b4fc;
            }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav {
                padding: 10px 12px;
            }

            .nav-brand {
                width: 100%;
                margin-right: 0;
                margin-bottom: 4px;
                font-size: 16px;
            }

            nav a {
                font-size: 12px;
                padding: 6px 8px;
            }

            .nav-user {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
                padding: 4px 0;
            }

            .main {
                padding: 16px 12px;
            }

            h1 {
                font-size: 22px;
            }

            .grid-3 {
                grid-template-columns: 1fr;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 22px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px 10px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }

            .card {
                padding: 16px;
            }

            .flex-mobile {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <nav>
        <span class="nav-brand">💰 BudżetApp</span>
        <a href="{% url 'dashboard' %}">📊 Dashboard</a>
        <a href="{% url 'lista' %}">📋 Wydatki</a>
        <a href="{% url 'przychody' %}">💵 Przychody</a>
        <a href="{% url 'statystyki' %}">📈 Statystyki</a>
        <a href="{% url 'dodaj_cel' %}">🎯 Cele</a>
        <div class="nav-user">
            {% if user.is_authenticated %}
            <span style="font-size:13px; color:#64748b;">👤 {{ user.username }}</span>
            <a href="{% url 'wylogowanie' %}" style="font-size:13px; color:#f87171;">Wyloguj</a>
            {% endif %}
        </div>
    </nav>

    <div class="main">
        {% block content %}{% endblock %}
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = Array.from({ length: 80 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.3,
            dx: (Math.random() - 0.5) * 0.3,
            dy: (Math.random() - 0.5) * 0.3,
            o: Math.random() * 0.5 + 0.1
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(129,140,248,${p.o})`;
                ctx.fill();
                p.x += p.dx;
                p.y += p.dy;
                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
            });
            requestAnimationFrame(draw);
        }

        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
