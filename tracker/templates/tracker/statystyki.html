{% extends 'tracker/base.html' %}

{% block content %}
<h1>Statystyki miesięczne</h1>

<div class="card">
    <h2>Wydatki i przychody per miesiąc</h2>
    <canvas id="wykres_miesiac" style="max-height:350px;"></canvas>
</div>

<script>
const labels = {{ labels|safe }};
const wydatki = {{ wydatki_values|safe }};
const przychody = {{ przychody_values|safe }};

const ctx = document.getElementById('wykres_miesiac').getContext('2d');
new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [
            {
                label: 'Wydatki',
                data: wydatki,
                backgroundColor: 'rgba(248,113,113,0.7)',
                borderColor: '#f87171',
                borderWidth: 1,
                borderRadius: 6,
            },
            {
                label: 'Przychody',
                data: przychody,
                backgroundColor: 'rgba(74,222,128,0.7)',
                borderColor: '#4ade80',
                borderWidth: 1,
                borderRadius: 6,
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: { color: '#94a3b8', font: { size: 13 } }
            }
        },
        scales: {
            x: {
                ticks: { color: '#64748b' },
                grid: { color: 'rgba(255,255,255,0.04)' }
            },
            y: {
                beginAtZero: true,
                ticks: {
                    color: '#64748b',
                    callback: value => value + ' zł'
                },
                grid: { color: 'rgba(255,255,255,0.04)' }
            }
        }
    }
});
</script>
{% endblock %}
