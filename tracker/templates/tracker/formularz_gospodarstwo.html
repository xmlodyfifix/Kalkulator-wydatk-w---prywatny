{% extends 'tracker/base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <h1>{{ tytul }}</h1>

    <div class="card">
        {% if blad %}
        <div style="color:#f87171; background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); border-radius:10px; padding:12px; margin-bottom:16px;">
            {{ blad }}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                {% if 'Stwórz' in tytul %}
                <label>Nazwa gospodarstwa</label>
                <input type="text" name="nazwa" placeholder="np. Filip i Kinga" required>
                {% elif 'Zmień' in tytul %}
                <label>Nowa nazwa gospodarstwa</label>
                <input type="text" name="nazwa" value="{{ nazwa }}" required>
                {% else %}
                <label>Kod gospodarstwa</label>
                <input type="text" name="kod" placeholder="Wpisz kod od partnera" required>
                {% endif %}
            </div>
            <div style="display:flex; gap:12px; margin-top:24px;">
                <button type="submit" class="btn btn-primary">{{ tytul }}</button>
                <a href="{% url 'gospodarstwo' %}" class="btn btn-ghost">Anuluj</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
